<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vertimpact Ltd is a specialist advisory and impact investment firm connecting international capital with Africa's green economy.">
    <title>Vertimpact</title>
    <link rel="stylesheet" href="./styles/base/reset.css">
    <link rel="stylesheet" href="./styles/base/tokens.css">
    <link rel="stylesheet" href="./styles/base/typography.css">
    <link rel="stylesheet" href="./styles/base/base.css">
    <link rel="stylesheet" href="./styles/components/header.css">
    <link rel="stylesheet" href="./styles/sections/hero.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header__content">
            <div class="header__logo">
                <a href="./" aria-label="Vertimpact home" class="header_home-link">
                    <span class="header__logo-text">VERT<span class="header__logo-accent">i</span>MPACT</span>
                </a>
            </div>
            <nav class="header__nav" id="site-navigation">
                <ul class="header__list">
                    <li class="header__item"><a href="#">About</a></li>
                    <li class="header__item"><a href="#">Services</a></li>
                    <li class="header__item"><a href="#">Why Vertimpact</a></li>
                    <li class="header__item"><a href="#">Contact</a></li>
                </ul>
                <div class="header__cta">
                    <a href="#" class="header__cta-link">
                        <span class="header__cta-text">Get in Touch</span>
                        <span class="header__cta-icon-wrap">
                            <svg class="header__cta-icon" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false">
                                <path d="M3 11L11 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M5.5 3H11V8.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </a>
                </div>
            </nav>

            <div class="header__mobile-nav">
                <button
                    class="header__burger"
                    type="button"
                    aria-label="Toggle navigation menu"
                    aria-controls="site-navigation"
                    aria-expanded="false"
                >
                    <svg
                        class="header__burger-icon"
                        width="50"
                        height="50"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <path d="M4 7H20" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" />
                        <path d="M4 12H20" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" />
                        <path d="M4 17H20" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        </div>
    </header>
    <!-- Header -->

    <main>
        <!-- Hero -->
        <section class="hero__wrapper">
            <div class="hero__image-wrapper">
                <img class="hero__image" src="./assets/images/vertimpact_hero.jpg" alt="City skyline at dusk representing Vertimpact's focus on Africa's green economy.">
            </div>
            <div class="hero__overlay"></div>
            <div class="hero__text-wrapper">
                <h1 class="hero__title">Bridging International Capital with Africa's Green Economy</h1>
                <div class="hero__brand" aria-label="Vertimpact">
                    <span class="hero__brand-divider" aria-hidden="true"></span>
                </div>
                <p class="hero__description">Vertimpact is a specialist advisory firm serving international investors across East Africa and the Indian Ocean rim.</p>
                <a class="hero__cta" href="#">
                    <svg class="cta__icon" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false">
                        <path d="M5 3L9 7L5 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Get In Touch</span>
                </a>
            </div>
        </section>
        <!-- Hero -->
    </main>

    <section class="mobile-menu__wrapper">
        <nav class="mobile-menu__nav">
            
        </nav>
    </section>

    <script src="./js/utils/dom.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
